name: CI

on:
  push:
  pull_request:

jobs:
  decouple-check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Arch Decoupling Guard
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File tools/check_arch_leak.ps1
